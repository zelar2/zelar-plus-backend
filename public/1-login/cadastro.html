<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZELAR+ - Cadastro</title>
  <script type="module" crossorigin src="../assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="../assets/script-DDHBh2Ku.js"></script>
  <link rel="stylesheet" crossorigin href="../assets/global-DWT78tNl.css">
  <link rel="stylesheet" crossorigin href="../assets/login-Camz7uKq.css">
</head>
<body>
  <div class="app-container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3l9-8z"/></svg>
      </div>
      <div class="logo-texto">ZELAR<span>+</span></div>
    </div>
    <p class="subtitulo">Crie sua conta</p>

    <div class="cartao brilho">
      <h1>Cadastro</h1>
      <p class="descricao">Preencha seus dados para começar</p>

      <form id="form-cadastro" novalidate>
        <div class="grupo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" class="campo" placeholder="Seu nome completo" autocomplete="name" />
          <span class="msg-erro" id="erro-nome">Informe seu nome completo.</span>
        </div>

        <div class="grupo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" class="campo" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" />
          <span class="msg-erro" id="erro-cpf">CPF inválido.</span>
        </div>

        <div class="grupo">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" class="campo" placeholder="(00) 00000-0000" inputmode="numeric" maxlength="15" />
          <span class="msg-erro" id="erro-telefone">Telefone inválido.</span>
        </div>

        <div class="grupo">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="campo" placeholder="seu@email.com" autocomplete="email" />
          <span class="msg-erro" id="erro-email">Informe um e-mail válido.</span>
        </div>

        <div class="linha">
          <div class="grupo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" class="campo" placeholder="Mín. 6 caracteres" autocomplete="new-password" />
            <span class="msg-erro" id="erro-senha">Mínimo 6 caracteres.</span>
          </div>
          <div class="grupo">
            <label for="confirmar">Confirmar</label>
            <input type="password" id="confirmar" class="campo" placeholder="Repita a senha" autocomplete="new-password" />
            <span class="msg-erro" id="erro-confirmar">As senhas não coincidem.</span>
          </div>
        </div>

        <button type="submit" class="botao" id="btn-cadastrar" disabled>Criar conta</button>
      </form>

      <p class="link-suave">Já tem conta? <a href="./index.html">Entrar</a></p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="overlay-loading" id="loading">
    <div class="spinner"></div>
    <p>Criando sua conta...</p>
  </div>

  <script>
    // ============================================================
    // FALLBACK: Funções essenciais caso os scripts externos não carreguem
    // ============================================================
    const ZC = (typeof ZelarCadastro !== 'undefined') ? ZelarCadastro : {
      ler: function() {
        try { const d = localStorage.getItem('zelar_cadastro'); return d ? JSON.parse(d) : {}; }
        catch(e) { return {}; }
      },
      salvar: function(obj) {
        try { const a = this.ler(); localStorage.setItem('zelar_cadastro', JSON.stringify({...a, ...obj})); }
        catch(e) {}
      },
      ir: function(url) {
        document.body.classList.add('saindo');
        setTimeout(() => { window.location.href = url; }, 300);
      },
      toast: function(msg, tipo) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('visivel');
        setTimeout(() => t.classList.remove('visivel'), 3000);
      },
      mascaraCPF: function(input) {
        input.addEventListener('input', function(e) {
          let v = e.target.value.replace(/\D/g, '');
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
          e.target.value = v;
        });
      },
      mascaraTelefone: function(input) {
        input.addEventListener('input', function(e) {
          let v = e.target.value.replace(/\D/g, '');
          if (v.length > 11) v = v.slice(0, 11);
          if (v.length > 10) {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
            v = v.replace(/(\d{5})(\d)/, '$1-$2');
          } else if (v.length > 6) {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
            v = v.replace(/(\d{4})(\d)/, '$1-$2');
          } else if (v.length > 2) {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
          }
          e.target.value = v;
        });
      },
      cpfValido: function(cpf) {
        cpf = cpf.replace(/\D/g, '');
        if (cpf.length !== 11 || /^(.)(\1){10}$/.test(cpf)) return false;
        let soma = 0, resto;
        for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10))) return false;
        soma = 0;
        for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        return resto === parseInt(cpf.substring(10, 11));
      },
      marcar: function(input, erroId, valido) {
        const erro = document.getElementById(erroId);
        if (valido) {
          input.classList.remove('erro');
          input.classList.add('ok');
          if (erro) erro.style.display = 'none';
        } else {
          input.classList.remove('ok');
          input.classList.add('erro');
          if (erro) erro.style.display = 'block';
        }
      }
    };

    // ============================================================
    // LÓGICA PRINCIPAL
    // ============================================================
    (function() {
      const nome = document.getElementById("nome");
      const cpf = document.getElementById("cpf");
      const telefone = document.getElementById("telefone");
      const email = document.getElementById("email");
      const senha = document.getElementById("senha");
      const confirmar = document.getElementById("confirmar");
      const btn = document.getElementById("btn-cadastrar");
      const form = document.getElementById("form-cadastro");
      const loading = document.getElementById("loading");

      if (!nome || !cpf || !telefone || !email || !senha || !confirmar || !btn) return;

      // Aplica máscaras
      try {
        ZC.mascaraCPF(cpf);
        ZC.mascaraTelefone(telefone);
      } catch(e) {}

      // Restaura dados salvos (se o usuário voltar)
      try {
        const salvo = ZC.ler();
        if (salvo) {
          if (salvo.nome) nome.value = salvo.nome;
          if (salvo.cpf) cpf.value = salvo.cpf;
          if (salvo.telefone) telefone.value = salvo.telefone;
          if (salvo.email) email.value = salvo.email;
        }
      } catch(e) {}

      function validarEmail(emailStr) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailStr);
      }

      function validar() {
        let okNome = false, okCpf = false, okFone = false, okEmail = false, okSenha = false, okConfirmar = false;

        try { okNome = nome.value.trim().split(/\s+/).length >= 2 && nome.value.trim().length > 3; } catch(e) {}
        try { okCpf = ZC.cpfValido(cpf.value); } catch(e) {}
        try { okFone = telefone.value.replace(/\D/g, "").length >= 10; } catch(e) {}
        try { okEmail = validarEmail(email.value); } catch(e) {}
        try { okSenha = senha.value.length >= 6; } catch(e) {}
        try { okConfirmar = confirmar.value === senha.value && confirmar.value.length >= 6; } catch(e) {}

        try {
          ZC.marcar(nome, "erro-nome", okNome);
          ZC.marcar(cpf, "erro-cpf", okCpf);
          ZC.marcar(telefone, "erro-telefone", okFone);
          ZC.marcar(email, "erro-email", okEmail);
          ZC.marcar(senha, "erro-senha", okSenha);
          ZC.marcar(confirmar, "erro-confirmar", okConfirmar);
        } catch(e) {}

        const tudoOk = okNome && okCpf && okFone && okEmail && okSenha && okConfirmar;
        btn.disabled = !tudoOk;
        btn.style.opacity = tudoOk ? '1' : '0.5';
        btn.style.cursor = tudoOk ? 'pointer' : 'not-allowed';
      }

      [nome, cpf, telefone, email, senha, confirmar].forEach((campo) => {
        if (campo) {
          campo.addEventListener("input", validar);
          campo.addEventListener("change", validar);
          campo.addEventListener("blur", validar);
        }
      });

      if (form) {
        form.addEventListener("submit", async function(e) {
          e.preventDefault();
          if (btn.disabled) return;

          if (loading) loading.classList.add("visivel");

          try {
            // Salva localmente
            ZC.salvar({
              nome: nome.value.trim(),
              cpf: cpf.value,
              telefone: telefone.value,
              email: email.value.trim(),
              senha: senha.value // Em produção, nunca salvar senha em localStorage!
            });

            // Tenta enviar para API
            let apiOk = false;
            try {
              const resp = await fetch("http://localhost:3000/api/cadastro", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  nome: nome.value.trim(),
                  cpf: cpf.value,
                  telefone: telefone.value,
                  email: email.value.trim(),
                  senha: senha.value
                })
              });
              apiOk = resp.ok;
            } catch(apiErr) {
              // Offline: continua com cadastro local
            }

            if (loading) loading.classList.remove("visivel");

            if (apiOk) {
              ZC.toast("Conta criada com sucesso!");
            } else {
              ZC.toast("Cadastro salvo! Sincronizaremos quando houver conexão.");
            }

            setTimeout(() => {
              try { ZC.ir("./index.html"); }
              catch(e) { window.location.href = "./index.html"; }
            }, 1500);

          } catch(err) {
            if (loading) loading.classList.remove("visivel");
            ZC.toast("Erro ao criar conta. Tente novamente.");
            console.error(err);
          }
        });
      }

      // Estado inicial do botão
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';

      validar();
    })();
  </script>
</body>
</html>
