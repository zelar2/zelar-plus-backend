<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZELAR+ - Recuperar senha</title>
  <script type="module" crossorigin src="../assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="../assets/script-DDHBh2Ku.js"></script>
  <link rel="stylesheet" crossorigin href="../assets/global-DWT78tNl.css">
  <link rel="stylesheet" crossorigin href="../assets/login-Camz7uKq.css">
</head>
<body>
  <div class="app-container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3l9-8z"/></svg>
      </div>
      <div class="logo-texto">ZELAR<span>+</span></div>
    </div>
    <p class="subtitulo">Recuperação de acesso</p>

    <div class="cartao brilho" id="cartao-form">
      <h1>Recuperar senha</h1>
      <p class="descricao">Informe seu e-mail para receber o link de redefinição</p>

      <form id="form-recuperar" novalidate>
        <div class="grupo">
          <label for="email">E-mail</label>
          <input type="email" id="email" class="campo" placeholder="seu@email.com" autocomplete="email" />
          <span class="msg-erro" id="erro-email">Informe um e-mail válido.</span>
        </div>

        <button type="submit" class="botao" id="btn-recuperar" disabled>Enviar link</button>
      </form>

      <p class="link-suave">Lembrou a senha? <a href="./index.html">Entrar</a></p>
    </div>

    <div class="cartao brilho oculto" id="cartao-sucesso">
      <div class="centralizar" style="font-size:52px">📩</div>
      <h1 class="mt-16">Verifique seu e-mail</h1>
      <p class="descricao" id="msg-sucesso">
        Enviamos um link de redefinição para o seu e-mail. Ele é válido por 30 minutos.
      </p>
      <a class="botao" href="./index.html">Voltar ao login</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="overlay-loading" id="loading">
    <div class="spinner"></div>
    <p>Enviando...</p>
  </div>

  <script>
    // ============================================================
    // FALLBACK: Funções essenciais caso os scripts externos não carreguem
    // ============================================================
    const ZC = (typeof ZelarCadastro !== 'undefined') ? ZelarCadastro : {
      salvar: function(obj) {
        try { const a = this.ler(); localStorage.setItem('zelar_cadastro', JSON.stringify({...a, ...obj})); }
        catch(e) {}
      },
      ler: function() {
        try { const d = localStorage.getItem('zelar_cadastro'); return d ? JSON.parse(d) : {}; }
        catch(e) { return {}; }
      },
      ir: function(url) {
        document.body.classList.add('saindo');
        setTimeout(() => { window.location.href = url; }, 300);
      },
      toast: function(msg, tipo) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('visivel');
        setTimeout(() => t.classList.remove('visivel'), 3000);
      }
    };

    // ============================================================
    // LÓGICA PRINCIPAL
    // ============================================================
    (function() {
      const email = document.getElementById("email");
      const btn = document.getElementById("btn-recuperar");
      const form = document.getElementById("form-recuperar");
      const cartaoForm = document.getElementById("cartao-form");
      const cartaoSucesso = document.getElementById("cartao-sucesso");
      const msgSucesso = document.getElementById("msg-sucesso");
      const loading = document.getElementById("loading");

      if (!email || !btn || !form || !cartaoForm || !cartaoSucesso) return;

      function validarEmail(emailStr) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailStr);
      }

      function validar() {
        let okEmail = false;
        try { okEmail = validarEmail(email.value); } catch(e) {}

        const erroEmail = document.getElementById("erro-email");
        if (okEmail) {
          email.classList.remove('erro');
          email.classList.add('ok');
          if (erroEmail) erroEmail.style.display = 'none';
        } else {
          email.classList.remove('ok');
          email.classList.add('erro');
          if (erroEmail) erroEmail.style.display = 'block';
        }

        btn.disabled = !okEmail;
        btn.style.opacity = okEmail ? '1' : '0.5';
        btn.style.cursor = okEmail ? 'pointer' : 'not-allowed';
      }

      email.addEventListener("input", validar);
      email.addEventListener("change", validar);
      email.addEventListener("blur", validar);

      form.addEventListener("submit", async function(e) {
        e.preventDefault();
        if (btn.disabled) return;

        if (loading) loading.classList.add("visivel");

        try {
          let enviado = false;

          // Tenta enviar via API
          try {
            const resp = await fetch("http://localhost:3000/api/recuperar-senha", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: email.value.trim() })
            });
            enviado = resp.ok;
          } catch(apiErr) {
            // Offline: simula envio
            enviado = true;
          }

          if (loading) loading.classList.remove("visivel");

          if (enviado) {
            // Mostra tela de sucesso
            cartaoForm.style.display = 'none';
            cartaoSucesso.classList.remove('oculto');
            cartaoSucesso.classList.add('anim-fade-up');

            if (msgSucesso) {
              msgSucesso.textContent = `Enviamos um link de redefinição para ${email.value.trim()}. Verifique sua caixa de entrada e spam. O link é válido por 30 minutos.`;
            }

            // Salva email para facilitar login depois
            try {
              ZC.salvar({ email_recuperacao: email.value.trim() });
            } catch(e) {}
          } else {
            ZC.toast("Não foi possível enviar o e-mail. Tente novamente.");
          }

        } catch(err) {
          if (loading) loading.classList.remove("visivel");
          ZC.toast("Erro ao processar. Tente novamente.");
          console.error(err);
        }
      });

      // Estado inicial
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
      validar();
    })();
  </script>
</body>
</html>
