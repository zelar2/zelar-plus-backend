<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZELAR+</title>
  <link rel="stylesheet" href="./assets/css/global.css" />
  <style>
    .splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .splash .logo-icon { width: 84px; height: 84px; border-radius: 24px; }
    .splash .logo-icon svg { width: 48px; height: 48px; }
    .splash .logo-texto { font-size: 42px; }
    .splash p { color: var(--texto-suave); font-size: 14px; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="splash">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3l9-8z"/></svg>
      </div>
      <div class="logo-texto">ZELAR<span>+</span></div>
      <p>Cuidado profissional na sua casa</p>
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = './1-login/index.html';
      }, 350);
    }, 1400);
  </script>
</body>
</html>
