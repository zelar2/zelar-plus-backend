<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZELAR+ API</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', Roboto, sans-serif; color: #fff;
      background: linear-gradient(160deg, #1e3c72, #2a5298); }
    .card { text-align: center; padding: 40px; border-radius: 18px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(12px); }
    h1 { margin: 0 0 8px; } h1 span { color: #00d4aa; }
    p { color: rgba(255,255,255,.72); margin: 6px 0; }
    code { background: rgba(0,0,0,.3); padding: 3px 10px; border-radius: 8px; color: #00d4aa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ZELAR<span>+</span> API</h1>
    <p>Servidor no ar ✅</p>
    <p>Status em <code>GET /api</code></p>
  </div>
</body>
</html>
