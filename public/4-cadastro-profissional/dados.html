<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZELAR+ - Dados Profissionais</title>
  <script type="module" crossorigin src="../assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="../assets/cadastro-CzP_A_lC.js"></script>
  <link rel="stylesheet" crossorigin href="../assets/global-DWT78tNl.css">
</head>
<body>
  <div class="app-container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3l9-8z"/></svg>
      </div>
      <div class="logo-texto">ZELAR<span>+</span></div>
    </div>
    <p class="subtitulo" id="subtitulo-categoria">Dados Profissionais</p>

    <div class="progresso">
      <div class="dot feito"></div>
      <div class="dot ativo"></div>
      <div class="dot"></div>
    </div>

    <div class="cartao brilho">
      <h1>Seus dados</h1>
      <p class="descricao">Informe seus dados profissionais</p>

      <form id="form-dados" novalidate>
        <div class="grupo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" class="campo" placeholder="Seu nome completo" autocomplete="name" />
          <span class="msg-erro" id="erro-nome">Informe seu nome completo.</span>
        </div>

        <div class="grupo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" class="campo" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" />
          <span class="msg-erro" id="erro-cpf">CPF inválido.</span>
        </div>

        <div class="grupo">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" class="campo" placeholder="(00) 00000-0000" inputmode="numeric" maxlength="15" />
          <span class="msg-erro" id="erro-telefone">Telefone inválido.</span>
        </div>

        <div class="linha">
          <div class="grupo">
            <label for="conselho" id="label-conselho">Número do conselho</label>
            <input type="text" id="conselho" class="campo" placeholder="Ex.: 123456" inputmode="numeric" />
            <span class="msg-erro" id="erro-conselho">Informe o número do conselho.</span>
          </div>
          <div class="grupo" style="max-width:110px">
            <label for="uf">UF</label>
            <select id="uf" class="campo">
              <option value="">UF</option>
              <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
              <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
              <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
              <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
              <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
              <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
              <option>SP</option><option>SE</option><option>TO</option>
            </select>
            <span class="msg-erro" id="erro-uf">Selecione.</span>
          </div>
        </div>

        <div class="linha">
          <button type="button" class="botao secundario" id="btn-voltar">Voltar</button>
          <button type="submit" class="botao" id="btn-continuar" disabled>Continuar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // FALLBACK: ZelarCadastro caso o JS externo não carregue
    // ============================================================
    const ZC = (typeof ZelarCadastro !== 'undefined') ? ZelarCadastro : {
      ler: function() {
        try {
          const dados = localStorage.getItem('zelar_cadastro');
          return dados ? JSON.parse(dados) : {};
        } catch(e) { return {}; }
      },
      salvar: function(obj) {
        try {
          const atual = this.ler();
          localStorage.setItem('zelar_cadastro', JSON.stringify({...atual, ...obj}));
        } catch(e) {}
      },
      ir: function(url) {
        document.body.classList.add('saindo');
        setTimeout(() => { window.location.href = url; }, 300);
      },
      mascaraCPF: function(input) {
        input.addEventListener('input', function(e) {
          let v = e.target.value.replace(/\D/g, '');
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d)/, '$1.$2');
          v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
          e.target.value = v;
        });
      },
      mascaraTelefone: function(input) {
        input.addEventListener('input', function(e) {
          let v = e.target.value.replace(/\D/g, '');
          if (v.length > 11) v = v.slice(0, 11);
          if (v.length > 10) {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
            v = v.replace(/(\d{5})(\d)/, '$1-$2');
          } else if (v.length > 6) {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
            v = v.replace(/(\d{4})(\d)/, '$1-$2');
          } else if (v.length > 2) {
            v = v.replace(/(\d{2})(\d)/, '($1) $2');
          }
          e.target.value = v;
        });
      },
      cpfValido: function(cpf) {
        cpf = cpf.replace(/\D/g, '');
        if (cpf.length !== 11 || /^(.)(\1){10}$/.test(cpf)) return false;
        let soma = 0, resto;
        for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10))) return false;
        soma = 0;
        for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        return resto === parseInt(cpf.substring(10, 11));
      },
      marcar: function(input, erroId, valido) {
        const erro = document.getElementById(erroId);
        if (valido) {
          input.classList.remove('erro');
          input.classList.add('ok');
          if (erro) erro.style.display = 'none';
        } else {
          input.classList.remove('ok');
          input.classList.add('erro');
          if (erro) erro.style.display = 'block';
        }
      }
    };

    // ============================================================
    // LÓGICA PRINCIPAL
    // ============================================================
    (function() {
      // Personaliza com a categoria escolhida
      let cadastro = {};
      try {
        cadastro = ZC.ler();
      } catch(e) { cadastro = {}; }

      if (cadastro && cadastro.categoria) {
        const subtitulo = document.getElementById("subtitulo-categoria");
        const labelConselho = document.getElementById("label-conselho");
        if (subtitulo) subtitulo.textContent = cadastro.categoria;
        if (labelConselho) {
          labelConselho.textContent =
            cadastro.conselho === "Não exige conselho" ? "Nº do certificado" : `Número do ${cadastro.conselho || "conselho"}`;
        }
      }

      const nome = document.getElementById("nome");
      const cpf = document.getElementById("cpf");
      const telefone = document.getElementById("telefone");
      const conselho = document.getElementById("conselho");
      const uf = document.getElementById("uf");
      const btn = document.getElementById("btn-continuar");

      // Aplica máscaras
      try {
        if (cpf) ZC.mascaraCPF(cpf);
        if (telefone) ZC.mascaraTelefone(telefone);
      } catch(e) {
        console.warn('Erro ao aplicar máscaras:', e);
      }

      // Restaura dados salvos
      if (cadastro.nome && nome) nome.value = cadastro.nome;
      if (cadastro.cpf && cpf) cpf.value = cadastro.cpf;
      if (cadastro.telefone && telefone) telefone.value = cadastro.telefone;
      if (cadastro.conselho_numero && conselho) conselho.value = cadastro.conselho_numero;
      if (cadastro.uf && uf) uf.value = cadastro.uf;

      function validar() {
        let okNome = false, okCpf = false, okFone = false, okConselho = false, okUf = false;

        try {
          okNome = nome && nome.value.trim().split(/\s+/).length >= 2 && nome.value.trim().length > 3;
        } catch(e) { okNome = false; }

        try {
          okCpf = cpf && ZC.cpfValido(cpf.value);
        } catch(e) { okCpf = false; }

        try {
          okFone = telefone && telefone.value.replace(/\D/g, "").length >= 10;
        } catch(e) { okFone = false; }

        try {
          okConselho = conselho && conselho.value.trim().length >= 3;
        } catch(e) { okConselho = false; }

        try {
          okUf = uf && uf.value !== "";
        } catch(e) { okUf = false; }

        // Marca visualmente os campos
        try {
          if (nome) ZC.marcar(nome, "erro-nome", okNome);
          if (cpf) ZC.marcar(cpf, "erro-cpf", okCpf);
          if (telefone) ZC.marcar(telefone, "erro-telefone", okFone);
          if (conselho) ZC.marcar(conselho, "erro-conselho", okConselho);
          if (uf) ZC.marcar(uf, "erro-uf", okUf);
        } catch(e) {
          console.warn('Erro ao marcar campos:', e);
        }

        const tudoOk = okNome && okCpf && okFone && okConselho && okUf;
        if (btn) {
          btn.disabled = !tudoOk;
          btn.style.opacity = tudoOk ? '1' : '0.5';
          btn.style.cursor = tudoOk ? 'pointer' : 'not-allowed';
        }
      }

      // Event listeners em todos os campos
      [nome, cpf, telefone, conselho, uf].forEach((campo) => {
        if (campo) {
          campo.addEventListener("input", validar);
          campo.addEventListener("change", validar);
          campo.addEventListener("blur", validar);
        }
      });

      // Submit do formulário
      const form = document.getElementById("form-dados");
      if (form) {
        form.addEventListener("submit", function(e) {
          e.preventDefault();
          if (!btn || btn.disabled) return;

          try {
            ZC.salvar({
              nome: nome ? nome.value.trim() : '',
              cpf: cpf ? cpf.value : '',
              telefone: telefone ? telefone.value : '',
              conselho_numero: conselho ? conselho.value.trim() : '',
              uf: uf ? uf.value : ''
            });
            ZC.ir("./documentos.html");
          } catch(err) {
            console.error('Erro ao salvar:', err);
            alert('Erro ao salvar dados. Tente novamente.');
          }
        });
      }

      // Botão voltar
      const btnVoltar = document.getElementById("btn-voltar");
      if (btnVoltar) {
        btnVoltar.addEventListener("click", function() {
          try { ZC.ir("./categorias.html"); }
          catch(e) { window.location.href = "./categorias.html"; }
        });
      }

      // Validação inicial
      validar();
    })();
  </script>
</body>
</html>
