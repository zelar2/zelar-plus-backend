<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZELAR+ - Documentos</title>
  <script type="module" crossorigin src="../assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="../assets/cadastro-CzP_A_lC.js"></script>
  <link rel="stylesheet" crossorigin href="../assets/global-DWT78tNl.css">
  <style>
    .upload {
      border: 2px dashed var(--vidro-borda);
      border-radius: var(--raio-pq);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: var(--transicao);
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .upload:hover { border-color: var(--acento); background: rgba(0,212,170,.06); }
    .upload.enviado { border-style: solid; border-color: var(--sucesso); background: rgba(46,229,157,.08); }
    .upload .icone { font-size: 30px; margin-bottom: 8px; }
    .upload .titulo { font-size: 14px; font-weight: 700; }
    .upload .detalhe { font-size: 12px; color: var(--texto-suave); margin-top: 4px; }
    .upload input { display: none; }

    /* Preview da imagem */
    .upload-preview {
      width: 100%;
      max-height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }
    .upload.enviado .upload-preview { display: block; }
    .upload.enviado .icone { display: none; }

    /* Botão remover */
    .btn-remover {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,50,50,0.9);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .upload.enviado .btn-remover { display: flex; }

    /* Barra de progresso */
    .progresso-upload {
      width: 100%;
      height: 3px;
      background: rgba(0,212,170,0.2);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progresso-upload.ativo { display: block; }
    .progresso-upload .barra {
      height: 100%;
      background: var(--acento);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Contador de documentos */
    .contador-docs {
      text-align: center;
      font-size: 13px;
      color: var(--texto-suave);
      margin-bottom: 16px;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--raio-pq);
    }
    .contador-docs strong { color: var(--acento); }
    .contador-docs.completo { color: var(--sucesso); background: rgba(46,229,157,.08); }

    /* Animação de pulso no upload */
    @keyframes pulse-border {
      0%, 100% { border-color: var(--vidro-borda); }
      50% { border-color: var(--acento); }
    }
    .upload.pendente {
      animation: pulse-border 2s infinite;
    }

    /* Fallback de ZelarCadastro */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--vidro); color: var(--texto); padding: 12px 24px; border-radius: var(--raio-pq); border: 1px solid var(--vidro-borda); opacity: 0; transition: all 0.3s ease; z-index: 9999; }
    .toast.visivel { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3l9-8z"/></svg>
      </div>
      <div class="logo-texto">ZELAR<span>+</span></div>
    </div>
    <p class="subtitulo">Cadastro de Profissional</p>

    <div class="progresso">
      <div class="dot feito"></div>
      <div class="dot feito"></div>
      <div class="dot ativo"></div>
    </div>

    <div class="cartao brilho">
      <h1>Documentos</h1>
      <p class="descricao">Envie fotos legíveis dos documentos</p>

      <div class="contador-docs" id="contador">
        Documentos enviados: <strong id="contador-num">0/3</strong>
      </div>

      <label class="upload pendente" data-doc="identidade">
        <input type="file" accept="image/*,.pdf" capture="environment" />
        <button type="button" class="btn-remover" data-remove="identidade">×</button>
        <div class="icone">🪪</div>
        <div class="titulo">RG ou CNH</div>
        <div class="detalhe">Documento de identidade com foto</div>
        <img class="upload-preview" id="preview-identidade" alt="Preview" />
        <div class="progresso-upload" id="progress-identidade">
          <div class="barra"></div>
        </div>
      </label>

      <label class="upload pendente" data-doc="conselho">
        <input type="file" accept="image/*,.pdf" capture="environment" />
        <button type="button" class="btn-remover" data-remove="conselho">×</button>
        <div class="icone">📜</div>
        <div class="titulo">Carteira do conselho / certificado</div>
        <div class="detalhe">Registro profissional da sua categoria</div>
        <img class="upload-preview" id="preview-conselho" alt="Preview" />
        <div class="progresso-upload" id="progress-conselho">
          <div class="barra"></div>
        </div>
      </label>

      <label class="upload pendente" data-doc="comprovante">
        <input type="file" accept="image/*,.pdf" capture="environment" />
        <button type="button" class="btn-remover" data-remove="comprovante">×</button>
        <div class="icone">🏠</div>
        <div class="titulo">Comprovante de residência</div>
        <div class="detalhe">Conta de luz, água ou telefone (últimos 90 dias)</div>
        <img class="upload-preview" id="preview-comprovante" alt="Preview" />
        <div class="progresso-upload" id="progress-comprovante">
          <div class="barra"></div>
        </div>
      </label>

      <div class="linha mt-8">
        <button class="botao secundario" id="btn-voltar">Voltar</button>
        <button class="botao" id="btn-continuar" disabled>Continuar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // FALLBACK de ZelarCadastro
    // ============================================================
    const ZC = (typeof ZelarCadastro !== 'undefined') ? ZelarCadastro : {
      ler: function() {
        try { const d = localStorage.getItem('zelar_cadastro'); return d ? JSON.parse(d) : {}; }
        catch(e) { return {}; }
      },
      salvar: function(obj) {
        try { const a = this.ler(); localStorage.setItem('zelar_cadastro', JSON.stringify({...a, ...obj})); }
        catch(e) {}
      },
      ir: function(url) {
        document.body.classList.add('saindo');
        setTimeout(() => { window.location.href = url; }, 300);
      },
      toast: function(msg, tipo) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('visivel');
        setTimeout(() => t.classList.remove('visivel'), 3000);
      }
    };

    // ============================================================
    // LÓGICA DE UPLOAD MELHORADA
    // ============================================================
    (function() {
      const uploads = document.querySelectorAll(".upload");
      const btn = document.getElementById("btn-continuar");
      const contadorEl = document.getElementById("contador");
      const contadorNum = document.getElementById("contador-num");
      let enviados = {};

      try {
        const dados = ZC.ler();
        enviados = (dados && dados.documentos) ? dados.documentos : {};
      } catch(e) { enviados = {}; }

      // Atualiza preview de imagem
      function mostrarPreview(doc, file) {
        const preview = document.getElementById('preview-' + doc);
        if (!preview) return;
        if (file && file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = function(e) {
            preview.src = e.target.result;
          };
          reader.readAsDataURL(file);
        } else if (file) {
          preview.src = '';
          preview.alt = '📄 ' + file.name;
        }
      }

      // Simula barra de progresso
      function animarProgresso(doc) {
        const barra = document.querySelector('#progress-' + doc + ' .barra');
        const container = document.getElementById('progress-' + doc);
        if (!barra || !container) return;
        container.classList.add('ativo');
        let progresso = 0;
        const intervalo = setInterval(() => {
          progresso += Math.random() * 25 + 10;
          if (progresso >= 100) {
            progresso = 100;
            clearInterval(intervalo);
            setTimeout(() => container.classList.remove('ativo'), 500);
          }
          barra.style.width = progresso + '%';
        }, 200);
      }

      // Atualiza estado visual
      function atualizar() {
        let count = 0;
        uploads.forEach((u) => {
          const doc = u.dataset.doc;
          const temDoc = !!enviados[doc];
          u.classList.toggle("enviado", temDoc);
          u.classList.toggle("pendente", !temDoc);

          const detalhe = u.querySelector(".detalhe");
          if (temDoc && detalhe) {
            detalhe.textContent = "✓ " + enviados[doc];
          }
          if (temDoc) count++;
        });

        // Atualiza contador
        contadorNum.textContent = count + "/3";
        if (count >= 2) {
          contadorEl.classList.add('completo');
          contadorEl.innerHTML = '✓ <strong>Pronto para continuar!</strong>';
        } else {
          contadorEl.classList.remove('completo');
          contadorEl.innerHTML = 'Documentos enviados: <strong>' + count + '/3</strong>';
        }

        // Habilita botão (identidade + conselho obrigatórios)
        btn.disabled = !(enviados.identidade && enviados.conselho);
        btn.style.opacity = btn.disabled ? '0.5' : '1';
      }

      // Upload de arquivo
      uploads.forEach((u) => {
        const input = u.querySelector("input[type='file']");
        if (!input) return;

        input.addEventListener("change", () => {
          if (input.files && input.files.length > 0) {
            const file = input.files[0];
            const doc = u.dataset.doc;

            // Valida tamanho (max 10MB)
            if (file.size > 10 * 1024 * 1024) {
              ZC.toast("Arquivo muito grande! Máx: 10MB", "erro");
              input.value = '';
              return;
            }

            // Valida tipo
            const tiposValidos = ['image/', 'application/pdf'];
            const valido = tiposValidos.some(t => file.type.startsWith(t) || file.name.toLowerCase().endsWith('.pdf'));
            if (!valido) {
              ZC.toast("Formato não suportado. Use imagem ou PDF.", "erro");
              input.value = '';
              return;
            }

            animarProgresso(doc);
            mostrarPreview(doc, file);

            enviados[doc] = file.name;
            try {
              ZC.salvar({ documentos: enviados });
            } catch(e) {}

            setTimeout(() => {
              ZC.toast("Documento anexado! ✓", "sucesso");
              atualizar();
            }, 800);
          }
        });
      });

      // Remover documento
      document.querySelectorAll('.btn-remover').forEach(btnRemover => {
        btnRemover.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const doc = btnRemover.dataset.remove;
          if (!doc) return;

          // Limpa preview
          const preview = document.getElementById('preview-' + doc);
          if (preview) { preview.src = ''; }

          // Limpa input
          const uploadEl = document.querySelector('.upload[data-doc="' + doc + '"]');
          if (uploadEl) {
            const input = uploadEl.querySelector('input');
            if (input) input.value = '';
          }

          delete enviados[doc];
          try { ZC.salvar({ documentos: enviados }); } catch(e) {}
          ZC.toast("Documento removido", "info");
          atualizar();
        });
      });

      // Botão continuar
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        try { ZC.ir("./foto.html"); }
        catch(e) { window.location.href = "./foto.html"; }
      });

      // Botão voltar
      document.getElementById("btn-voltar").addEventListener("click", () => {
        try { ZC.ir("./dados.html"); }
        catch(e) { window.location.href = "./dados.html"; }
      });

      // Inicializa
      atualizar();
    })();
  </script>
</body>
</html>
