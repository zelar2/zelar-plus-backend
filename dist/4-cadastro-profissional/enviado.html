<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZELAR+ - Cadastro Enviado</title>
  <style>
    .icone-grande {
      width: 96px; height: 96px; margin: 14px auto 20px; border-radius: 50%;
      background: rgba(46,229,157,.15); border: 2px solid var(--sucesso);
      display: flex; align-items: center; justify-content: center; font-size: 46px;
      animation: aparecer .5s ease;
    }
    @keyframes aparecer { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .etapa-analise { display: flex; align-items: center; gap: 12px; padding: 12px 0; font-size: 14px; }
    .etapa-analise .bolinha {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: rgba(0,212,170,.16); border: 1px solid var(--acento);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
  </style>
  <script type="module" crossorigin src="../assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="../assets/cadastro-CzP_A_lC.js"></script>
  <link rel="stylesheet" crossorigin href="../assets/global-DWT78tNl.css">
</head>
<body>
  <div class="app-container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3l9-8z"/></svg>
      </div>
      <div class="logo-texto">ZELAR<span>+</span></div>
    </div>

    <div class="cartao brilho" style="margin-top:40px">
      <div class="icone-grande">🎉</div>
      <h1 class="centralizar">Cadastro enviado!</h1>
      <p class="descricao" id="msg-personalizada">Seu cadastro foi recebido e está em análise.</p>

      <div class="divisor"></div>

      <div class="etapa-analise">
        <div class="bolinha">✓</div>
        <div><strong>Cadastro recebido</strong><br/><span class="texto-suave" style="font-size:12px">Dados e documentos enviados</span></div>
      </div>
      <div class="etapa-analise">
        <div class="bolinha">⏳</div>
        <div><strong>Análise documental</strong><br/><span class="texto-suave" style="font-size:12px">Prazo médio de 2 dias úteis</span></div>
      </div>
      <div class="etapa-analise">
        <div class="bolinha">📱</div>
        <div><strong>Ativação</strong><br/><span class="texto-suave" style="font-size:12px">Você será avisado por SMS e e-mail</span></div>
      </div>

      <button class="botao mt-24" id="btn-voltar-inicio">Voltar ao início</button>
    </div>
  </div>

  <script>
    const cadastro = ZelarCadastro.ler();
    if (cadastro.nome) {
      const primeiro = cadastro.nome.split(" ")[0];
      document.getElementById("msg-personalizada").textContent =
        `${primeiro}, recebemos seu cadastro como ${cadastro.categoria || "profissional"}. Nossa equipe vai analisar seus documentos.`;
    }
    document.getElementById("btn-voltar-inicio").addEventListener("click", () => {
      ZelarCadastro.limpar();
      ZelarCadastro.ir("../index.html");
    });
  </script>
</body>
</html>
