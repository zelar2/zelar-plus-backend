<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZELAR+ - Histórico de Atendimentos</title>
  <style>
    /* ===== RESET E BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Segoe UI', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      background: linear-gradient(160deg, #1e3c72 0%, #2a5298 100%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      transition: opacity 0.35s ease;
    }
    body.fade-out { opacity: 0; }

    /* ===== CONTAINER MOBILE ===== */
    .app-container {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* ===== HEADER ===== */
    .page-header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-voltar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .btn-voltar:hover { background: rgba(255,255,255,0.2); }
    .btn-voltar svg { width: 20px; height: 20px; }
    .header-info h1 { color: #fff; font-size: 20px; font-weight: 700; margin: 0; }
    .header-info p { color: rgba(255,255,255,0.7); font-size: 13px; margin: 2px 0 0; }

    /* ===== FILTROS ===== */
    .filtros-wrap {
      padding: 0 16px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filtros-wrap::-webkit-scrollbar { display: none; }
    .filtros { display: flex; gap: 8px; }
    .filtro-pill {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .filtro-pill.ativo {
      background: #00d4aa;
      color: #1e3c72;
      border-color: #00d4aa;
      font-weight: 600;
    }
    .filtro-pill:hover:not(.ativo) { background: rgba(255,255,255,0.15); }

    /* ===== ESTATÍSTICAS ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 16px 16px;
    }
    .stat-glass {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 16px 8px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .stat-glass .numero { font-size: 22px; font-weight: 700; color: #00d4aa; line-height: 1; }
    .stat-glass .label { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 6px; }

    /* ===== LISTA DE CARDS ===== */
    .lista-cards { padding: 0 16px 100px; }
    .secao-titulo {
      color: rgba(255,255,255,0.5);
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      margin: 20px 0 12px; padding-left: 4px;
    }

    /* Card */
    .card-lista {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .card-lista::before {
      content: "";
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    }
    .card-lista.status-concluido::before { background: #00d4aa; }
    .card-lista.status-cancelado::before { background: #ff5c7a; }
    .card-lista.status-andamento::before { background: #ffc94d; }
    .card-lista.status-agendado::before { background: #56ccf2; }
    .card-lista:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }

    .card-topo { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-titulo { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.3; flex: 1; padding-right: 8px; }
    .card-badge {
      padding: 4px 10px; border-radius: 12px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; white-space: nowrap; letter-spacing: 0.5px;
    }
    .status-concluido .card-badge { background: rgba(0,212,170,0.2); color: #00d4aa; }
    .status-cancelado .card-badge { background: rgba(255,92,122,0.2); color: #ff5c7a; }
    .status-andamento .card-badge { background: rgba(255,201,77,0.2); color: #ffc94d; }
    .status-agendado .card-badge { background: rgba(86,204,242,0.2); color: #56ccf2; }

    .card-detalhes { display: flex; flex-direction: column; gap: 8px; }
    .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.6); }
    .info-row svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.5; }
    .estrelas { color: #ffc94d; }

    .prof-row {
      display: flex; align-items: center; gap: 10px;
      margin-top: 4px; padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .avatar-mini {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #56ccf2, #2f80ed);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .prof-info-mini .nome { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); }
    .prof-info-mini .cat { font-size: 11px; color: rgba(255,255,255,0.5); }
    .card-valor { margin-left: auto; font-size: 15px; font-weight: 700; color: #00d4aa; white-space: nowrap; }

    /* ===== ESTADO VAZIO ===== */
    .vazio-glass { text-align: center; padding: 60px 20px; }
    .vazio-glass .icone { width: 80px; height: 80px; margin: 0 auto 16px; opacity: 0.3; color: rgba(255,255,255,0.5); }
    .vazio-glass h3 { font-size: 16px; color: #fff; margin-bottom: 8px; }
    .vazio-glass p { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
    .vazio-glass .botao {
      display: inline-block; padding: 14px 32px; border-radius: 12px;
      background: #00d4aa; color: #1e3c72;
      font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.2s;
    }
    .vazio-glass .botao:hover { opacity: 0.9; }

    /* ===== MENU INFERIOR ===== */
    .menu-fixo {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 500px;
      background: rgba(30,60,114,0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; justify-content: space-around;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 100; backdrop-filter: blur(20px);
    }
    .menu-item-fixo {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 4px 16px; color: rgba(255,255,255,0.5);
      text-decoration: none; font-size: 11px;
      transition: color 0.2s; border: none; background: none; cursor: pointer;
    }
    .menu-item-fixo.ativo { color: #00d4aa; }
    .menu-item-fixo svg { width: 22px; height: 22px; }

    /* ===== MODAL BOTTOM SHEET ===== */
    .modal-bottom {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-bottom.visivel { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: linear-gradient(180deg, #1e4fa3 0%, #0f2e6e 100%);
      border-radius: 24px 24px 0 0;
      width: 100%; max-width: 500px; max-height: 85vh;
      overflow-y: auto;
      padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
      transform: translateY(100%); transition: transform 0.3s;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .modal-bottom.visivel .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }

    /* Detalhes no modal */
    .detalhe-bloco { margin-bottom: 16px; }
    .detalhe-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .detalhe-valor { font-size: 14px; color: rgba(255,255,255,0.9); line-height: 1.5; }
    .detalhe-box { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 16px; backdrop-filter: blur(10px); }
    .botoes-acao { display: flex; gap: 12px; margin-top: 24px; }
    .btn-acao { flex: 1; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-align: center; text-decoration: none; transition: all 0.2s; }
    .btn-acao.primario { background: #00d4aa; color: #1e3c72; }
    .btn-acao.primario:hover { opacity: 0.9; }
    .btn-acao.secundario { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.8); color: #fff;
      padding: 12px 24px; border-radius: 12px; font-size: 13px;
      z-index: 300; opacity: 0; transition: all 0.3s;
      white-space: nowrap; backdrop-filter: blur(10px);
    }
    .toast.visivel { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
<base target="_blank">
</head>
<body>
  <div class="app-container">
    <!-- HEADER -->
    <div class="page-header">
      <button class="btn-voltar" onclick="voltar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="header-info">
        <h1>Histórico</h1>
        <p>Seus atendimentos</p>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filtros-wrap">
      <div class="filtros">
        <button class="filtro-pill ativo" data-filtro="todos">Todos</button>
        <button class="filtro-pill" data-filtro="concluido">Concluídos</button>
        <button class="filtro-pill" data-filtro="andamento">Em andamento</button>
        <button class="filtro-pill" data-filtro="agendado">Agendados</button>
        <button class="filtro-pill" data-filtro="cancelado">Cancelados</button>
      </div>
    </div>

    <!-- ESTATÍSTICAS -->
    <div class="stats-row">
      <div class="stat-glass">
        <div class="numero" id="stat-total">0</div>
        <div class="label">Total</div>
      </div>
      <div class="stat-glass">
        <div class="numero" id="stat-concluidos">0</div>
        <div class="label">Concluídos</div>
      </div>
      <div class="stat-glass">
        <div class="numero" id="stat-gasto">R$ 0</div>
        <div class="label">Gasto total</div>
      </div>
    </div>

    <!-- LISTA -->
    <div class="lista-cards" id="lista-atendimentos">
      <!-- Preenchido via JS -->
    </div>
  </div>

  <!-- MENU INFERIOR -->
  <nav class="menu-fixo">
    <a href="../3-selecionar-atendimento/index.html" class="menu-item-fixo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Início
    </a>
    <button class="menu-item-fixo ativo" onclick="location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Histórico
    </button>
    <a href="./perfil.html" class="menu-item-fixo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Perfil
    </a>
  </nav>

  <!-- MODAL DETALHES -->
  <div class="modal-bottom" id="modal-detalhes" onclick="fecharModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="./historico.js"></script>
</body>
</html>
